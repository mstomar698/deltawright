<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Deltawright late-wave (gap-E) fixture</title>
  </head>
  <body>
    <h1>Two-wave render</h1>
    <button id="open">Open</button>
    <button id="replace">Replace</button>
    <div id="host"></div>
    <script>
      const host = document.getElementById('host');

      // Additive two-wave render: wave 1 inserts immediately, wave 2 a beat later — AFTER
      // settle has resolved on wave 1's quiescence. With the default settle wave 2 is silently
      // missed; the gap-E watch (lateWatchMs) flags it without capturing it.
      document.getElementById('open').addEventListener('click', () => {
        const one = document.createElement('button');
        one.id = 'wave1';
        one.textContent = 'Wave One';
        host.appendChild(one);

        setTimeout(() => {
          const two = document.createElement('button');
          two.id = 'wave2';
          two.textContent = 'Wave Two';
          host.appendChild(two);
        }, 400);
      });

      // REPLACING two-wave render (a React-style re-render): wave 1 inserts, then wave 2
      // REMOVES wave 1 and inserts its replacement. The delta must still report wave 1 (frozen
      // at the settle point, before the removal) and must NOT capture the replacement.
      document.getElementById('replace').addEventListener('click', () => {
        const one = document.createElement('button');
        one.id = 'wave1';
        one.textContent = 'Wave One';
        host.appendChild(one);

        setTimeout(() => {
          one.remove();
          const two = document.createElement('button');
          two.id = 'wave2';
          two.textContent = 'Wave Two Replaced';
          host.appendChild(two);
        }, 400);
      });
    </script>
  </body>
</html>
