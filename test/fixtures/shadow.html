<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Deltawright shadow-DOM fixture</title>
</head>
<body>
  <h1>Web component</h1>
  <my-widget></my-widget>
  <script>
    class MyWidget extends HTMLElement {
      constructor() {
        super();
        const sr = this.attachShadow({ mode: 'open' });
        sr.innerHTML =
          '<style>' +
          '  .dialog { position: fixed; left: 320px; top: 160px; width: 300px; padding: 16px;' +
          '    background: #fff; border: 1px solid #333; border-radius: 8px; }' +
          '  button { font-size: 15px; padding: 6px 12px; }' +
          '</style>' +
          '<button id="open">Open in shadow</button>';
        sr.getElementById('open').addEventListener('click', () => {
          const dlg = document.createElement('div');
          dlg.className = 'dialog';
          dlg.setAttribute('role', 'dialog');
          dlg.setAttribute('aria-label', 'Shadow dialog');
          dlg.innerHTML = '<p>Inside a web component shadow root.</p><button class="ok">OK</button>';
          sr.appendChild(dlg);
        });
      }
    }
    customElements.define('my-widget', MyWidget);
  </script>
</body>
</html>
