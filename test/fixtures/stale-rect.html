<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Deltawright stale-rect (gap-F) fixture</title>
    <style>
      #mover {
        position: absolute;
        top: 100px;
      }
    </style>
  </head>
  <body>
    <h1>Post-settle reposition</h1>
    <button id="open">Open</button>
    <div id="host"></div>
    <script>
      // Insert a button, then JS-move it FAR to the right well after settle. It is a plain
      // style write (no CSS transition), so getAnimations() is empty and settleAnimations
      // never waits it out — the rect read at settle is stale. The gap-F re-check catches it.
      document.getElementById('open').addEventListener('click', () => {
        const b = document.createElement('button');
        b.id = 'mover';
        b.textContent = 'Mover';
        b.style.left = '100px';
        document.getElementById('host').appendChild(b);
        setTimeout(() => {
          b.style.left = '600px';
        }, 500);
      });
    </script>
  </body>
</html>
