name: ci

# Least privilege: CI only needs to read the repo. A fork PR already receives a
# read-only token (this uses `pull_request`, never `pull_request_target`, so PR code
# never sees repository secrets), but pin it explicitly so no step can gain write access.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    name: build (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Test (coalescer units + north-star validation)
        run: npm test
